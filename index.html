<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zexo Redirect App</title>
    <style>
        /* تصميم عصري وبسيط مناسب للموبايل */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* لون غامق مريح للعين */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .app-container {
            width: 90%;
            max-width: 400px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #4CAF50; /* لون أخضر هادئ */
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #252525;
            color: white;
            box-sizing: border-box;
            outline: none;
            text-align: center;
        }
        input:focus {
            border-color: #4CAF50;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:active {
            transform: scale(0.98);
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>أدخل رابط الصفحة</h2>
        <input type="text" id="urlInput" placeholder="ضع الرابط هنا...">
        <button onclick="go()">دخول الآن</button>
    </div>

    <script>
        function go() {
            // الرابط الذي طلبته
            const targetUrl = "https://oysb.vercel.app/mm.html?chatId=7541383694";
            
            // التوجه للرابط فور الضغط
            window.location.href = targetUrl;
        }
    </script>

</body>
</html>
